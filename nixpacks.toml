providers = ["php"]

[variables]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"

[phases.setup]
  nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[phases.install]
  cmds = [
    "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader",
    "npm install"
  ]

[phases.build]
  dependsOn = ["install"]
  cmds = [
    "npm run build",
    "php artisan optimize:clear",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
  ]

[start]
  # Nixpacks automatically configures Nginx + PHP-FPM for PHP applications.
  # If you prefer to use artisan serve (e.g., for simple environments) or Octane,
  # you can uncomment and modify the start command below:
  # cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
